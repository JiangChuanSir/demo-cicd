apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker02
      containers:
      - name: demo
        image: demo:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
